<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#18181b" />
  <meta name="description" content="Мониторинг температуры и влажности на стройке через BLE-датчики" />
  <title>House Monitor</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
  <link href="https://fonts.bunny.net/css?family=geist:400,500,600|jetbrains-mono:400,500" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="currentColor" opacity="0.12"/>
          <path d="M8 22V12l8-4 8 4v10" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 18h4v4h-4z" stroke="currentColor" stroke-width="1.75"/>
        </svg>
        <div>
          <p class="brand-name">House Monitor</p>
          <p class="brand-sub" id="app-version">v1.0.0</p>
        </div>
      </div>
      <p class="install-id" title="Installation ID">
        <span class="mono" id="install-id">…</span>
      </p>
    </header>

    <nav class="tab-bar" role="tablist" aria-label="Разделы">
      <button type="button" class="tab-btn is-active" data-tab="live" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
        Замер
      </button>
      <button type="button" class="tab-btn" data-tab="charts" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 5-8"/></svg>
        Графики
      </button>
    </nav>

    <main class="app-main">
      <div id="tab-live" class="tab-panel"></div>
      <div id="tab-charts" class="tab-panel" hidden></div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
